[pytest]
addopts = -ra
markers =
    unit: fast isolated tests
    integration: tests that touch real backend components or database
    external: tests that hit external services such as Telegram, Cloudinary or OCR APIs
    yap_real: real YAP browser automation tests
    production_gate: tests required before production deploy
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.MovedIn20Warning
