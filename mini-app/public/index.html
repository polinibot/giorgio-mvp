<!DOCTYPE html>
<html lang="it" style="background-color:#0f0f1a;">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Mini App Giorgio per inserimento pratiche meccanico" />
    <title>Giorgio - Gestione Pratiche Officina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      setTimeout(function () {
        try {
          if (!window.__GiorgioAppMounted) {
            var status = document.getElementById('bootstrap-status');
            if (status) {
              status.innerHTML = '⚠️ Mini App non caricata.<br>Il JavaScript non ha completato l\'avvio.';
              status.style.background = '#fee2e2';
              status.style.borderColor = '#fca5a5';
              status.style.color = '#991b1b';
            }
          }
        } catch (e) {}
      }, 4000);
    </script>
  </head>
  <body style="background-color:#0f0f1a;margin:0;padding:0;min-height:100vh;">
    <noscript>È necessario abilitare JavaScript per eseguire questa applicazione.</noscript>
    <div id="root" style="min-height:100vh;background:#0f0f1a;color:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px;">
      <div id="bootstrap-status" style="padding:12px;border:1px solid rgba(255,255,255,0.08);border-radius:8px;background:#1a1a2e;color:#f0f2f5;">Avvio Mini App...</div>
    </div>
  </body>
</html>
